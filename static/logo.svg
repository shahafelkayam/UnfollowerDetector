<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.2)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background is transparent! -->

  <!-- User Silhouette -->
  <g transform="translate(10, 10)">
    <!-- Head -->
    <circle cx="40" cy="25" r="16" fill="url(#glassGradient)" stroke="url(#neonGradient)" stroke-width="4" />
    <!-- Body -->
    <path d="M10,75 C10,50 70,50 70,75" fill="url(#glassGradient)" stroke="url(#neonGradient)" stroke-width="4" stroke-linecap="round" />
  </g>

  <!-- Magnifying Glass / Radar Overlay -->
  <g transform="translate(45, 45)" filter="url(#glow)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="#14b8a6" stroke-width="6" />
    <!-- Crosshair / Radar sweep -->
    <line x1="20" y1="2" x2="20" y2="12" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" />
    <line x1="20" y1="28" x2="20" y2="38" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" />
    <line x1="2" y1="20" x2="12" y2="20" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" />
    <line x1="28" y1="20" x2="38" y2="20" stroke="#14b8a6" stroke-width="3" stroke-linecap="round" />
    <!-- Handle -->
    <line x1="33" y1="33" x2="48" y2="48" stroke="#8b5cf6" stroke-width="8" stroke-linecap="round" />
  </g>
</svg>
